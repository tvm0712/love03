    // --- 狀態管理 ---
    let step = 'start'; 
    let currentQuestions = [];
    let currentIndex = 0;
    let answers = []; 
    let isMusicPlaying = false;
    
    const audioEl = document.getElementById('bg-music');
    audioEl.volume = 0.3;

    function shuffleAndPick(array, n) {
      const shuffled = [...array].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, n);
    }

    function toggleMusic() {
      const iconContainer = document.getElementById('music-icon-container');
      if (isMusicPlaying) {
        audioEl.pause();
        isMusicPlaying = false;
        iconContainer.innerHTML = icons.volumeX;
      } else {
        audioEl.play().catch(e => console.log("音訊播放失敗:", e));
        isMusicPlaying = true;
        iconContainer.innerHTML = icons.volume2;
      }
    }

    function startQuiz() {
      const qPhys = shuffleAndPick(QUESTION_BANK.phys, 3).map(q => ({ ...q, dim: 'phys' }));
      const qPsych = shuffleAndPick(QUESTION_BANK.psych, 3).map(q => ({ ...q, dim: 'psych' }));
      const qSpirit = shuffleAndPick(QUESTION_BANK.spirit, 4).map(q => ({ ...q, dim: 'spirit' }));
      
      currentQuestions = shuffleAndPick([...qPhys, ...qPsych, ...qSpirit], 10);
      
      currentIndex = 0;
      answers = [];
      step = 'quiz';

      if (!isMusicPlaying) {
        audioEl.play().then(() => {
          isMusicPlaying = true;
          document.getElementById('music-icon-container').innerHTML = icons.volume2;
        }).catch(e => console.log("瀏覽器阻擋自動播放", e));
      }
      render();
    }

    function handleAnswer(likertValue) {
      const currentQ = currentQuestions[currentIndex];
      let score = 50;
      if (currentQ.p === 1) {
        score = (likertValue - 1) * 25;
      } else {
        score = (5 - likertValue) * 25;
      }

      answers.push({ dim: currentQ.dim, score });

      if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        render();
      } else {
        step = 'result';
        render();
      }
    }

    function getResultsData() {
      const sums = { phys: { total: 0, count: 0 }, psych: { total: 0, count: 0 }, spirit: { total: 0, count: 0 } };
      answers.forEach(ans => {
        sums[ans.dim].total += ans.score;
        sums[ans.dim].count += 1;
      });

      return {
        phys: sums.phys.count ? Math.round(sums.phys.total / sums.phys.count) : 50,
        psych: sums.psych.count ? Math.round(sums.psych.total / sums.psych.count) : 50,
        spirit: sums.spirit.count ? Math.round(sums.spirit.total / sums.spirit.count) : 50,
      };
    }

    function getLevelText(dim, score) {

      const texts = {

          "【20-29分 明顯疏離】潛意識會想保持社交距離，排斥共用物品或空間。",
          "【30-39分 輕微冷感】沒有吸引力，對於肢體接觸感到勉強或不自在。",
          "【40-49分 無感邊緣】不排斥但絕對不渴望，身體毫無化學反應。",
          "【50-59分 順眼舒適】身體感官覺得放鬆、不緊繃，有著基本的接納度。",
          "【60-69分 明確好感】喜歡對方的氣味、聲音或外貌，有輕微的靠近渴望。",
          "【70-79分 強烈吸引】會產生心跳加速的愉悅感，渴望親密接觸。",
          "【80-89分 性感張力】身體完全為對方敞開，有著極深的生理迷戀與渴望。",
          "【90-100分 狂熱本能】無法自拔的絕對吸引，身體如磁鐵般互相吸引與共振。"
        ],
        psych: [
          "【0-9分 極度仇恨】充滿敵意、鄙視或深深的恐懼，完全無法忍受對方的言行。",
          "【10-19分 價值觀撕裂】溝通充滿毒性、情緒勒索或強烈的逆反防禦心理。",
          "【20-29分 心智摩擦】覺得對方難以理喻，交流時感到巨大的壓力與心累。",
          "【30-39分 溝通障礙】話不投機半句多，容易覺得無聊、尷尬或不耐煩。",
          "【40-49分 交集薄弱】缺乏共鳴，僅能進行最表面的客套或事務性交流。",
          "【50-59分 和平交流】能順暢溝通，不帶強烈情緒波動，像一般的普通熟人。",
          "【60-69分 心智共鳴】聊天感到愉快、有啟發，能夠分享日常並互相理解。",
          "【70-79分 深度依賴】充滿信任與安全感，能展露脆弱，是極佳的心智夥伴。",
          "【80-89分 三觀契合】幾乎能讀懂對方的心思，充滿欣賞、敬重與無條件的支持。",
          "【90-100分 心靈知己】靈魂深處的對話，思想高度交融，彼此是對方最懂的唯一。"
        ],
        spirit: [
          "【0-9分 靈魂毒藥】感覺對方代表著極致的黑暗，對生命力造成毀滅性打擊。",
          "【10-19分 能量吸血】關係像黑洞般抽乾你的光芒與靈氣，充滿深層的消耗。",
          "【20-29分 業力拖累】感覺被低頻的執念或宿命枷鎖困住，靈魂感到窒息。",
          "【30-39分 靈性失衡】相處時會感到莫名沉重、不安或偏離了自己的生命軌道。",
          "【40-49分 無交集點】感受不到形而上的連結，關係完全停留在唯物世俗層面。",
          "【50-59分 平靜無干擾】彼此的能量場互不侵犯，維持著最基本的個體獨立。",
          "【60-69分 溫和啟發】對方能帶來一些高維度的思考，讓你對世界有更多的包容。",
          "【70-79分 靈魂映照】對方像一面鏡子，幫助你療癒創傷、看見盲點並擴張自我。",
          "【80-89分 生命共同體】超越時間與肉體的絕對信任，共同經歷靈魂的覺醒與升級。",
          "【90-100分 宇宙合一】感受到萬物歸一的慈悲大愛，靈魂頻率完美共振，超越生死。"
        ]
      };
      return texts[dim][b];
    }

    function getSethDimAdvice(dim) {
      const texts = {
        phys: "賽斯認為身體是細胞意識的集體創作。分數低於 30 分代表細胞在排斥對方的電磁編碼；高於 90 分則是生物性的合一渴望。【量子視角】這如同量子糾纏，兩者的生物場產生了強烈的建設性干涉（Constructive Interference）。",
        psych: "心理狀態是自我（Ego）層面的翻譯與詮釋。分數高低反映了你們對彼此實相的翻譯準確度。【量子視角】這如同波的同頻共振，當頻率接近時，能量傳輸效率最高。",
        spirit: "這涉及存有（Entity）層面的連結，高分代表你們在架構二中互為支援。【量子視角】這代表了非局域性（Non-locality）的連結，超越了物質空間與時間的限制，是一種靈魂層面的相干性。"
      };
      return texts[dim];
    }

    // UI 互動：切換賽斯解析面板
    function toggleSethAdvice() {
      const content = document.getElementById('seth-advice-content');
      const icon = document.getElementById('seth-chevron');
      if (content.classList.contains('open')) {
        content.classList.remove('open');
        icon.style.transform = 'rotate(0deg)';
      } else {
        content.classList.add('open');
        icon.style.transform = 'rotate(180deg)';
      }
    }

    function render() {
      const appContent = document.getElementById('app-content');
      appContent.innerHTML = ''; 

      if (step === 'start') {
        appContent.innerHTML = `
          <div class="text-center animate-fade-in">
            <div class="flex justify-center gap-6 mb-8 text-slate-400">
              <div class="flex flex-col items-center gap-2">${icons.heart}<span>生理性</span></div>
              <div class="flex flex-col items-center gap-2">${icons.brain}<span>心理性</span></div>
              <div class="flex flex-col items-center gap-2">${icons.sparkles}<span>靈性</span></div>
            </div>
            <p class="text-gray-600 mb-8 leading-relaxed">
              本測驗將從百題題庫中隨機抽取 10 個情境。<br/>
              請回想某個特定的對象，憑直覺回答你真實的感受。<br/>
              測驗包含正向吸引與負向厭惡機制。
            </p>
            <button onclick="startQuiz()" class="bg-slate-900 text-white px-8 py-3 rounded-full font-medium hover:bg-slate-800 transition-colors flex items-center gap-2 mx-auto shadow-lg hover:shadow-xl">
              開始測驗 ${icons.arrowRight}
            </button>
          </div>
        `;
      } 
      else if (step === 'quiz') {
        const progressPercentage = ((currentIndex + 1) / 10) * 100;
        appContent.innerHTML = `
          <div class="animate-fade-in w-full max-w-xl mx-auto">
            <div class="mb-8">
              <div class="flex justify-between text-sm text-gray-500 mb-2">
                <span>題目進度</span>
                <span>${currentIndex + 1} / 10</span>
              </div>
              <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-slate-800 h-2 rounded-full transition-all duration-300" style="width: ${progressPercentage}%"></div>
              </div>
            </div>

            <div class="bg-slate-50 p-6 rounded-xl border border-slate-100 mb-8 min-h-[120px] flex items-center justify-center text-center shadow-sm">
              <h2 class="text-xl font-medium text-slate-800 leading-relaxed">
                ${currentQuestions[currentIndex].q}
              </h2>
            </div>

            <div class="flex flex-col gap-3">
              <button onclick="handleAnswer(5)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border-emerald-200">非常同意</button>
              <button onclick="handleAnswer(4)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-green-50 hover:bg-green-100 text-green-700 border-green-200">同意</button>
              <button onclick="handleAnswer(3)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-gray-50 hover:bg-gray-100 text-gray-700 border-gray-200">普通 / 不確定</button>
              <button onclick="handleAnswer(2)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-orange-50 hover:bg-orange-100 text-orange-700 border-orange-200">不同意</button>
              <button onclick="handleAnswer(1)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-red-50 hover:bg-red-100 text-red-700 border-red-200">非常不同意</button>
            </div>
          </div>
        `;
      } 
      else if (step === 'result') {
        const results = getResultsData();
        const archetype = getArchetype(results);

        const buildBar = (label, iconSvg, value, positiveColorClass, dimKey) => {
          const isPositive = value >= 50;
          const barWidth = Math.abs(value - 50) * 2;
          const levelDesc = getLevelText(dimKey, value);
          const sethDimText = getSethDimAdvice(dimKey);
          
          let negativeBarHtml = '';
          let positiveBarHtml = '';

          if (!isPositive) {
            negativeBarHtml = `<div class="absolute right-0 top-0 bottom-0 bg-red-400 transition-all duration-1000 ease-out animate-fade-in" style="width: ${barWidth}%"></div>`;
          } else {
            positiveBarHtml = `<div class="absolute left-0 top-0 bottom-0 ${positiveColorClass} transition-all duration-1000 ease-out animate-fade-in" style="width: ${barWidth}%"></div>`;
          }

          return `
            <div class="mb-10">
              <div class="flex justify-between items-center mb-2 text-sm font-medium text-gray-700">
                <div class="flex items-center gap-2">
                  ${iconSvg}
                  <span>${label}</span>
                </div>
                <span class="font-mono">${value} 分</span>
              </div>
              
              <div class="relative w-full h-8 bg-gray-100 rounded-full overflow-hidden flex">
                <div class="absolute left-1/2 top-0 bottom-0 w-0.5 bg-gray-400 z-10"></div>
                <div class="w-1/2 h-full relative">${negativeBarHtml}</div>
                <div class="w-1/2 h-full relative">${positiveBarHtml}</div>
              </div>
              
              <div class="flex justify-between text-xs text-gray-400 mt-1 mb-3">
                <span>極度排斥 (0)</span>
                <span>中立 (50)</span>
                <span>極度吸引 (100)</span>
              </div>
              
              <!-- 10分級距解析 -->
              <div class="p-3 bg-white border rounded-lg text-sm text-gray-600 leading-relaxed shadow-sm ${isPositive ? 'border-l-4 border-l-indigo-300' : 'border-l-4 border-l-red-300'}">
                ${levelDesc}
              </div>

              <!-- 維度專屬賽斯視角 -->
              <div class="mt-2 text-xs text-slate-500 bg-slate-100/50 p-3 rounded-lg flex gap-2 items-start">
                <div class="mt-0.5 text-amber-500">✨</div>
                <div>${sethDimText}</div>
              </div>
            </div>
          `;
        };

        appContent.innerHTML = `
          <div class="animate-fade-in">
            <div class="text-center mb-8">
              <h2 class="text-sm font-semibold text-gray-500 tracking-widest uppercase mb-2">關係原型分析</h2>
              <h3 class="text-3xl font-bold text-slate-900 mb-4">${archetype.title}</h3>
              <p class="text-gray-600 bg-slate-50 p-4 rounded-lg inline-block border border-slate-100 shadow-sm text-left max-w-lg mx-auto">
                ${archetype.desc}
              </p>
            </div>

            <!-- 賽斯深度解析區塊 (可點擊展開) -->
            <div class="mb-10 max-w-lg mx-auto">
              <button onclick="toggleSethAdvice()" class="w-full bg-gradient-to-r from-amber-50 to-orange-50 border border-amber-200 p-4 rounded-xl flex items-center justify-between text-amber-900 hover:shadow-md transition-all">
                <div class="flex items-center gap-2 font-medium">
                  <span class="text-xl">🌌</span>
                  賽斯與量子力學深度解析
                </div>
                <div id="seth-chevron" class="transition-transform duration-300 text-amber-600">
                  ${icons.chevronDown}
                </div>
              </button>
              
              <div id="seth-advice-content" class="expandable-content bg-white border border-amber-100 rounded-xl p-5 shadow-inner text-sm text-slate-700 leading-relaxed">
                <p><span class="font-semibold text-amber-700 block mb-1">【賽斯觀點與建議】</span>${archetype.seth}</p>
                <p class="mt-3 text-xs text-slate-400 pt-3 border-t border-slate-100">
                  ※ 記住，這份結果也是一種觀察，而你的觀察本身就在塑造你的關係實相。
                </p>
              </div>
            </div>

            <div class="mb-10 px-2 md:px-6">
              ${buildBar('生理性', icons.heartSmall, results.phys, 'bg-rose-400', 'phys')}
              ${buildBar('心理性', icons.brainSmall, results.psych, 'bg-indigo-400', 'psych')}
              ${buildBar('靈性', icons.sparklesSmall, results.spirit, 'bg-violet-400', 'spirit')}
            </div>

            <div class="text-center mt-8">
              <button onclick="step = 'start'; render();" class="text-slate-500 hover:text-slate-900 font-medium flex items-center gap-2 mx-auto transition-colors px-6 py-3 bg-slate-100 rounded-full hover:bg-slate-200">
                ${icons.rotateCcw} 重新評測其他關係
              </button>
            </div>
          </div>
        `;
      }
    }

    render();
  </script>
</body>
</html>
