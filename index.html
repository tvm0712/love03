    const shuffleAndPick = (array, n) => {
      const shuffled = [...array].sort(() => 0.5 - Math.random());
      return shuffled.slice(0, n);
    };

    // 音樂控制
    function toggleMusic() {
      const iconContainer = document.getElementById('music-icon-container');
      if (isMusicPlaying) {
        audioEl.pause();
        isMusicPlaying = false;
        iconContainer.innerHTML = icons.volumeX;
      } else {
        audioEl.play().catch(e => console.log("音訊播放失敗:", e));
        isMusicPlaying = true;
        iconContainer.innerHTML = icons.volume2;
      }
    }

    // 初始化測驗
    function startQuiz() {
      // 隨機抽取: 生理3題, 心理3題, 靈性4題 (共10題)
      const qPhys = shuffleAndPick(QUESTION_BANK.phys, 3).map(q => ({ ...q, dim: 'phys' }));
      const qPsych = shuffleAndPick(QUESTION_BANK.psych, 3).map(q => ({ ...q, dim: 'psych' }));
      const qSpirit = shuffleAndPick(QUESTION_BANK.spirit, 4).map(q => ({ ...q, dim: 'spirit' }));
      
      // 混合並打亂這10題
      currentQuestions = shuffleAndPick([...qPhys, ...qPsych, ...qSpirit], 10);
      
      currentIndex = 0;
      answers = [];
      step = 'quiz';

      // 嘗試播放音樂
      if (!isMusicPlaying) {
        audioEl.play().then(() => {
          isMusicPlaying = true;
          document.getElementById('music-icon-container').innerHTML = icons.volume2;
        }).catch(e => console.log("瀏覽器阻擋自動播放", e));
      }

      render();
    }

    // 處理作答
    function handleAnswer(likertValue) {
      const currentQ = currentQuestions[currentIndex];
      
      // 分數轉換
      let score = 50;
      if (currentQ.p === 1) {
        score = (likertValue - 1) * 25;
      } else {
        score = (5 - likertValue) * 25;
      }

      answers.push({ dim: currentQ.dim, score });

      if (currentIndex < currentQuestions.length - 1) {
        currentIndex++;
        render(); // 重新渲染下一題
      } else {
        step = 'result';
        render(); // 渲染結果
      }
    }

    // 計算分數與取得結果
    function getResultsData() {
      const sums = { phys: { total: 0, count: 0 }, psych: { total: 0, count: 0 }, spirit: { total: 0, count: 0 } };
      
      answers.forEach(ans => {
        sums[ans.dim].total += ans.score;
        sums[ans.dim].count += 1;
      });

      return {
        phys: sums.phys.count ? Math.round(sums.phys.total / sums.phys.count) : 50,
        psych: sums.psych.count ? Math.round(sums.psych.total / sums.psych.count) : 50,
        spirit: sums.spirit.count ? Math.round(sums.spirit.total / sums.spirit.count) : 50,
      };
    }

    function getArchetype(res) {
      const { phys, psych, spirit } = res;
      if (phys >= 70 && psych >= 70 && spirit >= 70) return { title: "極致合一 / 靈魂伴侶", desc: "身、心、靈三個層次都達到極高度的共鳴與吸引。這是一種罕見且強大的連結，彼此互相擴張了生命的體驗。" };
      if (phys <= 35 && psych <= 35 && spirit <= 35) return { title: "極度排斥 / 宿敵狀態", desc: "從肉體到靈魂都對這個人感到徹底的排斥與不適。對方可能觸發了你極深的防禦機制或創傷反應。" };
      if (phys >= 65 && psych <= 40) return { title: "致命吸引力 / 相愛相殺", desc: "身體上有著極度強烈的渴望與契合，但在心理層面卻可能互相折磨或價值觀嚴重衝突。這是一段充滿張力與危險的關係。" };
      if (psych >= 65 && phys <= 40) return { title: "純粹友誼 / 無性伴侶", desc: "心理與心智上有著高度的共鳴與依賴，但對於彼此的肉體接觸感到排斥或冷感。這是極度深厚但不帶生物性慾望的連結。" };
      if (spirit >= 65 && psych <= 40) return { title: "業力牽絆 / 病態救贖", desc: "心理上可能充滿痛苦、疲憊或厭惡，但基於某種形而上的宿命感或執念（如拯救對方）而無法分離。" };
      if (psych >= 60 && phys >= 60 && spirit <= 50) return { title: "務實伴侶 / 世俗愛侶", desc: "在現實生活與日常互動中具備良好的吸引力與默契，雖然尚未觸及深層的靈性共振，但已是非常穩定的伴侶關係。" };
      if (phys <= 45 && psych <= 45 && spirit >= 65) return { title: "虛幻投射 / 盲目崇拜", desc: "在缺乏真實的生理吸引與心理互動下，單方面將對方神格化，這通常建立在個人的幻想或遠距離的投射之上。" };
      if (phys >= 40 && phys <= 60 && psych >= 40 && psych <= 60 && spirit >= 40 && spirit <= 60) return { title: "點頭之交 / 無感狀態", desc: "彼此之間沒有特別的吸引力，但也沒有強烈的排斥感。目前處於一種非常中立、無交集的狀態。" };
      
      return { title: "發展中光譜 / 混合型關係", desc: "你們的關係具備多重矛盾或尚未完全定型的特質。某些層面互相吸引，某些層面卻有所抗拒，處於動態變化的過程。" };
    }

    // --- 渲染畫面 ---
    function render() {
      const appContent = document.getElementById('app-content');
      appContent.innerHTML = ''; // 清空

      if (step === 'start') {
        appContent.innerHTML = `
          <div class="text-center animate-fade-in">
            <div class="flex justify-center gap-6 mb-8 text-slate-400">
              <div class="flex flex-col items-center gap-2">${icons.heart}<span>生理性</span></div>
              <div class="flex flex-col items-center gap-2">${icons.brain}<span>心理性</span></div>
              <div class="flex flex-col items-center gap-2">${icons.sparkles}<span>靈性</span></div>
            </div>
            <p class="text-gray-600 mb-8 leading-relaxed">
              本測驗將從百題題庫中隨機抽取 10 個情境。<br/>
              請回想某個特定的對象，憑直覺回答你真實的感受。<br/>
              測驗包含正向吸引與負向厭惡機制。
            </p>
            <button onclick="startQuiz()" class="bg-slate-900 text-white px-8 py-3 rounded-full font-medium hover:bg-slate-800 transition-colors flex items-center gap-2 mx-auto">
              開始測驗 ${icons.arrowRight}
            </button>
          </div>
        `;
      } 
      else if (step === 'quiz') {
        const progressPercentage = ((currentIndex + 1) / 10) * 100;
        appContent.innerHTML = `
          <div class="animate-fade-in w-full max-w-xl mx-auto">
            <div class="mb-8">
              <div class="flex justify-between text-sm text-gray-500 mb-2">
                <span>題目進度</span>
                <span>${currentIndex + 1} / 10</span>
              </div>
              <div class="w-full bg-gray-200 rounded-full h-2">
                <div class="bg-slate-800 h-2 rounded-full transition-all duration-300" style="width: ${progressPercentage}%"></div>
              </div>
            </div>

            <div class="bg-slate-50 p-6 rounded-xl border border-slate-100 mb-8 min-h-[120px] flex items-center justify-center text-center shadow-sm">
              <h2 class="text-xl font-medium text-slate-800 leading-relaxed">
                ${currentQuestions[currentIndex].q}
              </h2>
            </div>

            <div class="flex flex-col gap-3">
              <button onclick="handleAnswer(5)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border-emerald-200">非常同意</button>
              <button onclick="handleAnswer(4)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-green-50 hover:bg-green-100 text-green-700 border-green-200">同意</button>
              <button onclick="handleAnswer(3)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-gray-50 hover:bg-gray-100 text-gray-700 border-gray-200">普通 / 不確定</button>
              <button onclick="handleAnswer(2)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-orange-50 hover:bg-orange-100 text-orange-700 border-orange-200">不同意</button>
              <button onclick="handleAnswer(1)" class="w-full py-4 px-6 rounded-lg border transition-colors duration-200 font-medium bg-red-50 hover:bg-red-100 text-red-700 border-red-200">非常不同意</button>
            </div>
          </div>
        `;
      } 
      else if (step === 'result') {
        const results = getResultsData();
        const archetype = getArchetype(results);

        const buildBar = (label, iconSvg, value, positiveColorClass) => {
          const isPositive = value >= 50;
          const barWidth = Math.abs(value - 50) * 2;
          
          let negativeBarHtml = '';
          let positiveBarHtml = '';

          if (!isPositive) {
            negativeBarHtml = `<div class="absolute right-0 top-0 bottom-0 bg-red-400 transition-all duration-1000 ease-out animate-fade-in" style="width: ${barWidth}%"></div>`;
          } else {
            positiveBarHtml = `<div class="absolute left-0 top-0 bottom-0 ${positiveColorClass} transition-all duration-1000 ease-out animate-fade-in" style="width: ${barWidth}%"></div>`;
          }

          return `
            <div class="mb-6">
              <div class="flex justify-between items-center mb-2 text-sm font-medium text-gray-700">
                <div class="flex items-center gap-2">
                  ${iconSvg}
                  <span>${label}</span>
                </div>
                <span class="font-mono">${value} 分</span>
              </div>
              <div class="relative w-full h-8 bg-gray-100 rounded-full overflow-hidden flex">
                <div class="absolute left-1/2 top-0 bottom-0 w-0.5 bg-gray-400 z-10"></div>
                <div class="w-1/2 h-full relative">${negativeBarHtml}</div>
                <div class="w-1/2 h-full relative">${positiveBarHtml}</div>
              </div>
              <div class="flex justify-between text-xs text-gray-400 mt-1">
                <span>極度排斥 (0)</span>
                <span>中立 (50)</span>
                <span>極度吸引 (100)</span>
              </div>
            </div>
          `;
        };

        appContent.innerHTML = `
          <div class="animate-fade-in">
            <div class="text-center mb-8">
              <h2 class="text-sm font-semibold text-gray-500 tracking-widest uppercase mb-2">關係原型分析</h2>
              <h3 class="text-3xl font-bold text-slate-900 mb-4">${archetype.title}</h3>
              <p class="text-gray-600 bg-slate-50 p-4 rounded-lg inline-block border border-slate-100">
                ${archetype.desc}
              </p>
            </div>

            <div class="mb-10 px-2 md:px-8">
              ${buildBar('生理性', icons.heartSmall, results.phys, 'bg-rose-400')}
              ${buildBar('心理性', icons.brainSmall, results.psych, 'bg-indigo-400')}
              ${buildBar('靈性', icons.sparklesSmall, results.spirit, 'bg-violet-400')}
            </div>

            <div class="text-center">
              <button onclick="step = 'start'; render();" class="text-slate-500 hover:text-slate-900 font-medium flex items-center gap-2 mx-auto transition-colors">
                ${icons.rotateCcw} 重新測驗
              </button>
            </div>
          </div>
        `;
      }
    }

    // 初次載入渲染
    render();
  </script>
</body>
</html>
